services:

  # ── Core (always active) ─────────────────────────────────────────────────────
  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    ports:
      - "${GRPC_PORT:-50051}:50051"   # gRPC StreamingRecognize
      - "${HTTP_PORT:-8090}:8090"     # HTTP /health /metrics /admin
      - "${WS_PORT:-8091}:8091"       # WebSocket browser clients
    volumes:
      - ./deploy/docker/core-docker.yaml:/etc/speechmux/core.yaml:ro
      - ./deploy/docker/plugins-docker.yaml:/etc/speechmux/plugins.yaml:ro
    depends_on:
      vad-silero:
        condition: service_healthy
      # STT plugin excluded from depends_on: profile variants (stt-sherpa, stt-faster-whisper)
      # have different service names; depends_on does not resolve network aliases.
      # Core's health-check interval + circuit breaker handles the startup race.
    restart: unless-stopped

  # ── VAD Plugin (always active) ───────────────────────────────────────────────
  vad-silero:
    build:
      context: .
      dockerfile: plugin-vad/Dockerfile
    volumes:
      - ./deploy/docker/vad-docker.yaml:/etc/speechmux/vad.yaml:ro
    expose:
      - "50060"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('localhost',50060),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s    # torch+silero model load takes ~30-60s on first start
    restart: unless-stopped

  # ── STT: sherpa-onnx (CPU, default) ─────────────────────────────────────────
  # Start with: docker compose --profile sherpa up
  # Referenced directly by service name in plugins-docker.yaml (stt-sherpa:50061).
  stt-sherpa:
    profiles: ["sherpa"]
    build:
      context: .
      dockerfile: plugin-stt/Dockerfile
    volumes:
      - ./deploy/docker/inference-sherpa-docker.yaml:/etc/speechmux/inference.yaml:ro
      - ${MODELS_DIR:-./plugin-stt-sherpa-onnx/models}:/models:ro
    expose:
      - "50061"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('localhost',50061),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s    # sherpa-onnx model load takes ~30s on first start
    restart: unless-stopped

  # ── STT: faster-whisper (CPU; swap device/compute_type in config for GPU) ────
  # Start with: docker compose --profile faster-whisper up
  # Build context is workspace root (Dockerfile needs proto/ and plugin-stt/).
  # Model is auto-downloaded from HuggingFace on first start; no /models mount needed.
  stt-faster-whisper:
    profiles: ["faster-whisper"]
    build:
      context: .
      dockerfile: plugin-stt-faster-whisper/Dockerfile
    volumes:
      - ./deploy/docker/inference-faster-whisper-docker.yaml:/etc/speechmux/inference.yaml:ro
    expose:
      - "50062"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket; s=socket.create_connection(('localhost',50062),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s    # faster-whisper small/cpu model download + load takes ~30-90s on first start
    restart: unless-stopped

  # ── Web Client (always active) ───────────────────────────────────────────────
  client-web-api:
    build:
      context: ./client-web/api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - CORE_WS_URL=ws://core:8091/ws/stream
      - CORE_API_KEY=${CORE_API_KEY:-}
      - ACCESS_TOKEN=${ACCESS_TOKEN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      - core
    restart: unless-stopped

  client-web-front:
    build:
      context: ./client-web/web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked at build time — passed as build args, not runtime env.
        # Browser uses window.location.hostname + this port to reach the API.
        - NEXT_PUBLIC_API_PORT=${API_PORT:-8000}
    ports:
      - "${WEB_PORT:-3020}:3020"
    environment:
      - PORT=3020
      # Server-side only: Next.js API route fetches live engine list from Core admin.
      # Must point to Core's http_port (default 8090). Not exposed to the browser.
      - CORE_ADMIN_URL=http://core:8090
    depends_on:
      - client-web-api
    restart: unless-stopped
