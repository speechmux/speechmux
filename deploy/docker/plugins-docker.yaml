vad:
  endpoints:
    - id: "vad-0"                    # Unique ID for this endpoint; appears in health check reports.
      address: "vad-silero:50060"    # TCP host:port — Docker service name resolves via internal DNS.
  health_check_interval_sec: 10      # Interval (seconds) between health probes to VAD endpoints.
  circuit_breaker:
    failure_threshold: 5             # Consecutive failures before the circuit opens.
    half_open_timeout_sec: 30        # Seconds before HALF_OPEN recovery probe is attempted.

inference:
  routing_mode: "least_connections"  # Routing strategy: round_robin | least_connections | active_standby.
  endpoints:
    - id: "sherpa-onnx"              # Unique ID; used in health reports and engine_hint routing.
      address: "stt-plugin:50061"    # TCP host:port — resolves to whichever STT profile is active via
                                     # Docker network alias "stt-plugin".
      priority: 1                    # Priority for active_standby routing. Higher = preferred.
  health_check_interval_sec: 10      # Interval (seconds) between health probes to STT endpoints.
  health_probe_timeout_sec: 5        # Per-probe timeout (seconds). Probes exceeding this count as failures.
  circuit_breaker:
    failure_threshold: 5             # Consecutive failures before the circuit opens.
    half_open_timeout_sec: 30        # Seconds before HALF_OPEN recovery probe is attempted.
